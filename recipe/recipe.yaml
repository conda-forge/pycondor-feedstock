schema_version: 1

context:
  name: PyCondor
  version: 0.6.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name|lower }}-${{ version }}.tar.gz
  sha256: b5ae2fe28b1ea03801304c95dc944d61ca7f8745529c8346e639da745413c690

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - pycondor = pycondor.cli:cli

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=38.6.0
  run:
    - click
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pycondor
        - pycondor.job
        - pycondor.dagman
        - pycondor.utils
        - pycondor.basenode
        - pycondor.cli
        - pycondor.visualize
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pycondor -h

about:
  license: MIT
  license_file: LICENSE
  summary: Python utility for HTCondor
  description: |
    PyCondor (Python HTCondor) is a tool to help build and submit workflows to
    HTCondor in a straight-forward manner with minimal hassle.


  homepage: https://github.com/pycondor/pycondor
  repository: https://github.com/pycondor/pycondor.git
  documentation: https://pycondor.readthedocs.io/

extra:
  recipe-maintainers:
    - duncanmmacleod
    - GregoryAshton
    - jodergrosse
    - jrbourbeau
